name: Weather Sync

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      - name: Run weather sync
        env:
          GDASH_SYNC_BASE_URL: ${{ vars.GDASH_SYNC_BASE_URL }}
          WEATHER_SYNC_SECRET: ${{ secrets.WEATHER_SYNC_SECRET }}
          WEATHER_BOOTSTRAP_DAYS: "30"
        run: python collector-python/github_sync.py
